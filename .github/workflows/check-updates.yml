# =============================================================================
# BSI Data Freshness Check — Monthly check for new BSI publications
# =============================================================================
#
# Runs on the 1st of each month at 08:00 UTC.
# Checks the BSI portal for new Technical Guidelines, IT-Grundschutz updates,
# and advisories. Creates a GitHub issue if new content is detected.
#
# Also runnable manually via workflow_dispatch.
# =============================================================================

name: Check BSI Data Updates

on:
  schedule:
    - cron: "0 8 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-updates:
    name: Check for BSI Updates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check BSI guidance portal
        id: check_guidance
        run: |
          # Check BSI Technical Guidelines page for recent updates
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://www.bsi.bund.de/EN/Themen/Unternehmen-und-Organisationen/Standards-und-Zertifizierung/Technische-Richtlinien/technische-richtlinien_node.html")
          echo "guidance_status=${HTTP_STATUS}" >> "$GITHUB_OUTPUT"
          echo "BSI guidance portal HTTP status: ${HTTP_STATUS}"

      - name: Check BSI advisory feed
        id: check_advisories
        run: |
          # Check BSI advisories page
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://www.bsi.bund.de/SiteGlobals/Forms/Suche/BSI/Sicherheitswarnungen/Sicherheitswarnungen_Formular.html")
          echo "advisories_status=${HTTP_STATUS}" >> "$GITHUB_OUTPUT"
          echo "BSI advisories portal HTTP status: ${HTTP_STATUS}"

      - name: Create summary
        run: |
          echo "## BSI Data Freshness Check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source | HTTP Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| BSI Guidance Portal | ${{ steps.check_guidance.outputs.guidance_status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| BSI Advisory Feed | ${{ steps.check_advisories.outputs.advisories_status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Action required:** Review BSI portal manually for new publications and run the ingest script if updates are available." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Run: \`npx tsx scripts/ingest-bsi.ts\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Open issue if portals are reachable
        if: |
          steps.check_guidance.outputs.guidance_status == '200' ||
          steps.check_advisories.outputs.advisories_status == '200'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const title = `Monthly BSI data freshness check — ${today}`;

            // Check if an open issue with this title already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'data-freshness',
            });

            const exists = issues.data.some(i => i.title === title);
            if (exists) {
              console.log('Issue already exists, skipping.');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ['data-freshness'],
              body: [
                '## Monthly BSI Data Freshness Check',
                '',
                'This issue is created automatically on the 1st of each month to prompt a review of BSI publications.',
                '',
                '### Checklist',
                '',
                '- [ ] Review [BSI Technical Guidelines](https://www.bsi.bund.de/EN/Themen/Unternehmen-und-Organisationen/Standards-und-Zertifizierung/Technische-Richtlinien/technische-richtlinien_node.html) for new or updated TRs',
                '- [ ] Review [BSI IT-Grundschutz](https://www.bsi.bund.de/grundschutz) for Kompendium updates',
                '- [ ] Review [BSI Standards](https://www.bsi.bund.de/EN/Themen/Unternehmen-und-Organisationen/Standards-und-Zertifizierung/IT-Grundschutz/BSI-Standards/bsi-standards_node.html) for new 200-series documents',
                '- [ ] Review [BSI Advisories](https://www.bsi.bund.de/SiteGlobals/Forms/Suche/BSI/Sicherheitswarnungen/Sicherheitswarnungen_Formular.html) for new CB-K advisories',
                '- [ ] Run `npx tsx scripts/ingest-bsi.ts` if new content is available',
                '- [ ] Rebuild and push Docker image after ingest',
                '',
                `_Generated: ${today}_`,
              ].join('\n'),
            });
